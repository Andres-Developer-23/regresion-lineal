<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Clasificador por Regresión Lineal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; }
        .metric-card { border-left: 4px solid var(--bs-primary); }
        .metric-card.accuracy { border-left-color: #0d6efd; }
        .metric-card.precision { border-left-color: #198754; }
        .metric-card.recall { border-left-color: #ffc107; }
        .metric-card.f1 { border-left-color: #dc3545; }
        .metric-card.auc { border-left-color: #6f42c1; }
        .coef-positive { color: #2ecc71; }
        .coef-negative { color: #e74c3c; }
        .hero-section { background: linear-gradient(135deg, var(--bs-dark) 0%, #1a1a2e 100%); padding: 3rem 0; }
        .footer { border-top: 1px solid var(--bs-border-color); }
        pre { max-height: 300px; overflow-y: auto; }
        .table-responsive { max-height: 400px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">
                <i class="bi bi-graph-up-arrow me-2"></i>ClasificadorML
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'datasets' %}"><i class="bi bi-database me-1"></i>Datasets</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'upload' %}"><i class="bi bi-upload me-1"></i>Subir Datos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'models' %}"><i class="bi bi-cpu me-1"></i>Modelos</a>
                    </li>
                </ul>
                <span class="navbar-text text-muted small">
                    <i class="bi bi-book me-1"></i>Regresión Logística
                </span>
            </div>
        </div>
    </nav>

    <main class="py-4">
        <div class="container">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer mt-5 py-3 text-center text-muted small">
        <div class="container">
            <p class="mb-0">
                <i class="bi bi-mortarboard-fill me-1"></i>
                Plataforma educativa — Regresión Logística y Clasificación Supervisada
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
